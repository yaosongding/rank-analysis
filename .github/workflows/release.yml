name: Release Build

on:
  # 主路径：推送 v* tag 即发版（tag 名是唯一的版本真相源）
  push:
    tags: ['v*']
  # 兜底：手动补发，必须显式填 version（无 tag 时的版本来源）
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. v1.8.8 (required for manual run)'
        required: false
        default: ''
      notes:
        description: 'Release Notes (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Upload Assets (Windows)
    runs-on: windows-latest
    
    # 定义全局工作目录，适用于所有 run 步骤
    defaults:
      run:
        working-directory: ./lol-record-analysis-tauri
    
    # 导出版本号给下一个 Job 使用
    outputs:
      tauri_version: ${{ steps.get_version.outputs.tauri_version }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lol-record-analysis-tauri/package-lock.json

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install dependencies
        run: npm ci

      # --- 核心步骤：从 tag 解析版本号（tag 为唯一真相源）---
      # tag 触发时用 tag 名；手动触发时用 workflow_dispatch 的 version 输入。
      # 仓库里 tauri.conf.json 的 version 只是占位值，不参与这里的解析。
      - name: 🔍 Get App Version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
              $tauriVersion = "${{ github.ref_name }}"
          } else {
              $tauriVersion = "${{ github.event.inputs.version }}"
          }

          if ([string]::IsNullOrWhiteSpace($tauriVersion)) {
              Write-Error "No version resolved. Push a tag like v1.8.8, or provide the 'version' input on manual run."
              exit 1
          }

          # GitHub Release 惯例：tag 以 'v' 开头
          if ($tauriVersion -notlike 'v*') {
              $tauriVersion = "v$tauriVersion"
          }
          $cleanVersion = $tauriVersion -replace '^v',''

          Write-Host "Release Version: $tauriVersion (clean: $cleanVersion)"
          echo "tauri_version=$tauriVersion" >> $env:GITHUB_OUTPUT
          echo "clean_version=$cleanVersion" >> $env:GITHUB_OUTPUT

      # --- 把解析出的版本号写进 tauri.conf.json（仅 runner 工作区，不回写仓库）---
      - name: 🔧 Sync version into tauri.conf.json
        shell: bash
        env:
          CLEAN: ${{ steps.get_version.outputs.clean_version }}
        run: |
          node -e '
            const fs = require("fs");
            const f = "src-tauri/tauri.conf.json";
            const j = JSON.parse(fs.readFileSync(f, "utf8"));
            j.version = process.env.CLEAN;
            fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            console.log("tauri.conf.json version set to " + j.version);
          '

      # --- 构建并签名 ---
      - name: 🔨 Build Tauri App (Signed)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }} # 兼容旧版
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }} # 兼容旧版
          # 编译期注入 DashScope 密钥：Rust 侧 option_env!("DASHSCOPE_API_KEY") 在
          # cargo build 时读取并烤进二进制（线上 key）。需在仓库 Secrets 配置。
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          # 同款套路注入 Sentry DSN：observability.rs 的 option_env!("SENTRY_DSN") 烤进二进制。
          # 不再硬编码进源码，fork 不带此 secret 即不上报。需在仓库 Secrets 配置。
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # --- 文件重命名、压缩与路径整理 ---
      - name: 📝 Rename, Compress, and Set Paths
        id: prepare_assets
        shell: pwsh
        # 兜底签名分支（构建未产出 .sig 时走 `tauri signer sign`）需要密钥——
        # GH Actions 的 env 是 step 级作用域，构建步骤的密钥不会带到本步骤，
        # 缺了就报 "TAURI_PRIVATE_KEY is missing"（2026-07-11 四次发版失败根因）。
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }} # 脚本自检+CLI 旧名兼容
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: |
          # 获取上一步解析出的版本号
          $version = "${{ steps.get_version.outputs.tauri_version }}" 
          $cleanVersion = $version -replace '^v',''
          
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $releaseDir = "src-tauri/target/release"
          $appName = "lol-record-analysis-app"

          # 1. 处理安装包 (.exe) 和 签名文件 (.sig)
          $installerFile = Get-ChildItem -Path $nsisDir -Filter "*.exe" -ErrorAction Stop
          $sigFile = Get-ChildItem -Path $nsisDir -Filter "*.sig" -ErrorAction SilentlyContinue

          if ($installerFile.Count -ne 1) { 
            Write-Error "Expected 1 installer file, found $($installerFile.Count)"
            exit 1 
          }
          
          $setupName = "$appName-$cleanVersion-setup.exe"
          Rename-Item -Path $installerFile[0].FullName -NewName $setupName

          $sigPath = ""
            $sigName = "$setupName.sig"
            if ($sigFile.Count -gt 0) {
              # 如果 tauri build 已经生成了签名文件，统一改名为与安装包一致
              Rename-Item -Path $sigFile[0].FullName -NewName $sigName
            } else {
              # 一些 Tauri / bundler 组合不会在 NSIS 目录下自动输出 .sig
              # 这里显式对“安装包文件本身”生成 updater 用的 minisign 签名
              Write-Host "No .sig found in NSIS output. Generating with 'tauri signer sign'..."

              $installerPath = Join-Path $nsisDir $setupName
              if (-not (Test-Path $installerPath)) {
                Write-Error "Installer not found at $installerPath"
                exit 1
              }

              if ([string]::IsNullOrEmpty($env:TAURI_PRIVATE_KEY)) {
                Write-Error "TAURI_PRIVATE_KEY is missing; cannot sign installer."
                exit 1
              }

              # 如果你的 key 是空密码，这里保证变量存在，避免 CLI 交互提示
              if ($null -eq $env:TAURI_PRIVATE_KEY_PASSWORD) {
                $env:TAURI_PRIVATE_KEY_PASSWORD = ""
              }

              npx tauri signer sign "$installerPath"
            }

            $sigCandidate = Join-Path $nsisDir $sigName
            if (Test-Path $sigCandidate) {
              $sigPath = "$($env:GITHUB_WORKSPACE)/lol-record-analysis-tauri/$nsisDir/$sigName"
            } else {
                Write-Error "Signature file missing: $sigCandidate"
                exit 1
            }

          # 2. 处理绿色版 (Portable .7z)
          $exeName = "$appName.exe"
          $portable7zName = "$appName-$cleanVersion-portable.7z"
          
          if (Test-Path "$releaseDir/$exeName") {
            Push-Location $releaseDir
            7z a -t7z $portable7zName $exeName
            Pop-Location
          } else {
            Write-Error "Main executable not found for portable packing."
            exit 1
          }

          # 3. 输出供 Release 步骤使用的路径
          $setupPath = "$($env:GITHUB_WORKSPACE)/lol-record-analysis-tauri/$nsisDir/$setupName"
          $portablePath = "$($env:GITHUB_WORKSPACE)/lol-record-analysis-tauri/$releaseDir/$portable7zName"
          
          echo "setup_path=$setupPath" >> $env:GITHUB_OUTPUT
          echo "portable_path=$portablePath" >> $env:GITHUB_OUTPUT
          echo "sig_path=$sigPath" >> $env:GITHUB_OUTPUT

      - name: 🔍 Get Previous Tag
        id: get_prev_tag
        shell: pwsh
        run: |
          $currentTag = "${{ steps.get_version.outputs.tauri_version }}"
          # 按版本号降序，定位当前 tag，下一个就是上一个发布
          $tagList = (git tag --sort=-version:refname 2>$null) -split "`n" | Where-Object { $_ -ne "" }
          $currentIndex = [Array]::IndexOf($tagList, $currentTag)

          if ($currentIndex -ge 0 -and ($currentIndex + 1) -lt $tagList.Count) {
            $prevTag = $tagList[$currentIndex + 1]
          } elseif ($currentIndex -lt 0 -and $tagList.Count -gt 0) {
            # 当前 tag 还没打，git 里的最新 tag 就是 prevTag
            $prevTag = $tagList[0]
          }

          if ($prevTag) {
            Write-Host "Previous tag: $prevTag"
            echo "prev_tag=$prevTag" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No previous tag; generating full-history changelog"
            echo "prev_tag=" >> $env:GITHUB_OUTPUT
          }

      - name: ⚡ Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: 📝 Generate Changelog
        working-directory: .
        shell: pwsh
        run: |
          $currentTag = "${{ steps.get_version.outputs.tauri_version }}"
          $prevTag = "${{ steps.get_prev_tag.outputs.prev_tag }}"

          # 删除旧的 CHANGELOG 避免追加
          if (Test-Path "lol-record-analysis-tauri/CHANGELOG.md") {
            Remove-Item "lol-record-analysis-tauri/CHANGELOG.md" -Force
          }

          if ($prevTag) {
            git-cliff --config .github/cliff.toml "$prevTag..HEAD" --tag $currentTag --output lol-record-analysis-tauri/CHANGELOG.md
          } else {
            git-cliff --config .github/cliff.toml --tag $currentTag --output lol-record-analysis-tauri/CHANGELOG.md
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📄 Prepare Release Body
        shell: pwsh
        run: |
          $notes = "${{ github.event.inputs.notes }}"
          # 现在的 CHANGELOG.md 就在当前的工作目录中 (lol-record-analysis-tauri)
          $changelog = Get-Content CHANGELOG.md -Raw
          
          if (-not [string]::IsNullOrWhiteSpace($notes)) {
              Set-Content -Path RELEASE_BODY.md -Value "$notes`n`n$changelog"
          } else {
              Set-Content -Path RELEASE_BODY.md -Value $changelog
          }

      # --- 生成 latest.json（必须在创建 Release 前完成，便于一次上传所有资源）---
      - name: 📝 Generate latest.json
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            
            const version = process.env.VERSION;
            const setupPath = process.env.SETUP_PATH;
            const sigPath = process.env.SIG_PATH;
            
            // 尝试读取自动生成的 RELEASE_BODY.md
            let autoNotes = "";
            try {
                if (fs.existsSync("RELEASE_BODY.md")) {
                    autoNotes = fs.readFileSync("RELEASE_BODY.md", "utf8");
                }
            } catch (e) {
                console.warn("Could not read RELEASE_BODY.md", e);
            }

            // 优先使用生成的 body（包含手动输入+自动日志），其次回退
            const notes = autoNotes || process.env.NOTES || "For details, please check the GitHub Release page.";

            const exeFile = path.basename(setupPath);
            let signature = "";
            
            if (sigPath && fs.existsSync(sigPath)) {
                signature = fs.readFileSync(sigPath, "utf8");
                console.log("Signature loaded successfully.");
            } else {
                console.warn("WARNING: Signature file missing or empty.");
            }
            
            const data = {
                version: version,
                notes: notes,
                pub_date: new Date().toISOString(),
                platforms: {
                    "windows-x86_64": {
                        signature: signature,
                        url: `https://github.com/wnzzer/rank-analysis/releases/download/${version}/${exeFile}`
                    }
                }
            };
            
            fs.writeFileSync("latest.json", JSON.stringify(data, null, 2));
            console.log("latest.json generated.");
          '
        env:
          VERSION: ${{ steps.get_version.outputs.tauri_version }}
          NOTES: ${{ github.event.inputs.notes }}
          SETUP_PATH: ${{ steps.prepare_assets.outputs.setup_path }}
          SIG_PATH: ${{ steps.prepare_assets.outputs.sig_path }}

      # --- 创建或更新 Release 并上传所有资源 ---
      - name: 🚀 Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tauri_version }}
          name: Release ${{ steps.get_version.outputs.tauri_version }}
          body_path: lol-record-analysis-tauri/RELEASE_BODY.md
          files: |
            ${{ steps.prepare_assets.outputs.setup_path }}
            ${{ steps.prepare_assets.outputs.portable_path }}
            lol-record-analysis-tauri/latest.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: false


  # --- 任务二：同步 Release（含安装包）到 GitCode 国内镜像 ---
  # GitCode 走华为云 OBS 预签名上传：GET upload_url -> PUT 文件（OBS 自动回调注册附件）。
  # 注意：API 返回的 browser_download_url 用 api.gitcode.com（会 404），真正能匿名下载的是
  # gitcode.com host，所以 latest.json 里的下载链接改写成 gitcode.com。
  gitcode-release:
    name: Sync Release to GitCode
    needs: build-and-release
    runs-on: ubuntu-latest
    env:
      OWNER: wnzzer
      REPO: rank-analysis
      VERSION: ${{ needs.build-and-release.outputs.tauri_version }}
      COMMITISH: ${{ github.sha }}
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: ⏳ Wait for GitHub Release assets
        run: sleep 30

      - name: ⬇️ Download release assets from GitHub
        run: |
          mkdir -p dist
          gh release download "$VERSION" --repo wnzzer/rank-analysis \
            --pattern '*-setup.exe' --pattern '*-portable.7z' --pattern 'latest.json' \
            --dir dist
          ls -la dist

      - name: 🚀 Create GitCode release + upload assets
        run: |
          python3 - <<'PY'
          import os, json, glob, urllib.request, urllib.parse, urllib.error

          token = os.environ["GITCODE_TOKEN"]
          owner, repo = os.environ["OWNER"], os.environ["REPO"]
          version, commitish = os.environ["VERSION"], os.environ["COMMITISH"]
          api = f"https://api.gitcode.com/api/v5/repos/{owner}/{repo}"
          AUTH = {"private-token": token}

          def call(url, data=None, method="GET", headers=None):
              r = urllib.request.Request(url, data=data, method=method, headers=headers or {})
              try:
                  resp = urllib.request.urlopen(r)
                  return resp.status, resp.read()
              except urllib.error.HTTPError as e:
                  return e.code, e.read()

          # release 说明取 latest.json 里的 notes（含 changelog），兜底用版本号
          body = f"GitCode 国内镜像发布 {version}"
          lj = glob.glob("dist/latest.json")
          if lj:
              try:
                  body = json.load(open(lj[0])).get("notes") or body
              except Exception:
                  pass

          # 1) 不存在则创建 release（target_commitish 用 SHA，顺带在 GitCode 建 tag）
          st, _ = call(f"{api}/releases/tags/{version}", headers=AUTH)
          if st == 200:
              print("release already exists, skip create")
          else:
              payload = json.dumps({
                  "tag_name": version, "name": version, "body": body,
                  "target_commitish": commitish, "prerelease": False,
              }).encode()
              st, b = call(f"{api}/releases", payload, "POST",
                           {"Content-Type": "application/json;charset=UTF-8", "private-token": token})
              print("create release:", st, b[:200])
              if st not in (200, 201):
                  raise SystemExit("create release failed")

          # 2) latest.json 下载链接改写成 gitcode.com host 后再上传
          for p in lj:
              d = json.load(open(p))
              setup = glob.glob("dist/*-setup.exe")
              if setup:
                  name = os.path.basename(setup[0])
                  d.setdefault("platforms", {}).setdefault("windows-x86_64", {})["url"] = \
                      f"https://gitcode.com/{owner}/{repo}/releases/download/{version}/{name}"
                  json.dump(d, open(p, "w"), ensure_ascii=False, indent=2)

          # 3) 逐个产物：GET upload_url -> PUT 到 OBS（带回返回的全部 headers）
          def upload(path):
              fn, size = os.path.basename(path), os.path.getsize(path)
              q = urllib.parse.urlencode({"file_name": fn, "file_size": size})
              st, b = call(f"{api}/releases/{version}/upload_url?{q}", headers=AUTH)
              if st != 200:
                  raise SystemExit(f"upload_url failed for {fn}: {st} {b[:200]}")
              info = json.loads(b)
              st, b = call(info["url"], open(path, "rb").read(), "PUT", info.get("headers", {}))
              print(f"upload {fn} ({size} bytes): {st} {b[:80]}")
              if st != 200:
                  raise SystemExit(f"PUT failed for {fn}: {st}")

          for pat in ("dist/*-setup.exe", "dist/*-portable.7z", "dist/latest.json"):
              for p in glob.glob(pat):
                  upload(p)
          print("GitCode release sync done")
          PY